<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            border-collapse: collapse;
        }

        td {
            padding: 12px;
        }

        th {
            padding: 10px;
        }

        div {
            width: 300px;
            padding: 20px;
            border: 1px solid gray;
        }

        h3 {
            text-align: center;
        }

        input {
            width: 230px;
            padding: 5px;
        }

        select {
            width: 190px;
            padding: 5px;
        }

        input[type="submit"] {
            width: 100px;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <h1>1. Create an Event Highlights List</h1>
    <h2>Event Highlights</h2>
    <ul>
        <li>Guess Speakers</li>
        <li>Workshop</li>
        <li>Networking</li>
    </ul>
    <hr>
    <h1>2.Create an Event Schedule Table</h1>
    <table border="1">
        <tr>
            <th colspan="4" style="background-color: rgb(176, 221, 221);">Event Schedule</th>
        </tr>
        <tr>
            <th style="border-collapse: collapse;">Time</th>
            <th>Session</th>
            <th>speaker</th>
            <th>room</th>
        </tr>
        <tr>
            <td>10.00 AM</td>
            <td>web Development Workshop</td>
            <td>john Smith</td>
            <td>Hall A</td>
        </tr>
    </table>

    <hr>
    <h1>3. Create an event Registration form</h1>
    <div>
        <h3>Register For the event</h3>
        <form action="">
            <label>Name:</label>
            <input type="text" placeholder="enter name" name="name"><br><br>
            <label>Email:</label>
            <input type="email" placeholder="enter email" name="email"><br><br>
            <label> Choose Ticket:</label>
            <select>
                <option value="">Standard</option>
                <option value="">average</option>
                <option value="">vip</option>
            </select>
            <br>

            <br>
            <input type="submit" value="Submit">
        </form>

    </div>
</body>

</html>
